<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
    <title>Quiz app</title>
  </head>
  <body>
    <!-- Start Screen -->
    <div id="start-screen">
        <h1>JavaScript Quiz</h1>
            <p>10 questions · 1 minute per question</p>
        <button id="start-btn">Start Quiz</button>
    </div>
    
    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
        <h1>JavaScript Quiz</h1>
            <p>Question 1</p>
        <button id="option-a">option-a</button>
        <button id="option-b">option-b</button>
        <button id="option-c">option-c</button>
        <button id="option-d">option-d</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
        <h1>JavaScript Quiz</h1>
            <p>10 questions · you got 10 points</p>
        <button id="start-btn">Start Again</button>
    </div>
    
</html>
