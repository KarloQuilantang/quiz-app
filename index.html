<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full">
        <div id="start-screen" class="text-center">
            <h1 class="text-2xl font-bold mb-4">Science Quiz</h1>
            <p class="mb-6 text-gray-600">Test your knowledge on the respiratory system!</p>
            <button id="start-btn" class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600 transition">Start Quiz</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <h2 id="question" class="text-xl font-semibold mb-4 text-gray-800"></h2>
            <div id="options" class="flex flex-col gap-3"></div>

        <div class="flex justify-between mt-6">
            <button id="back-btn" class="px-6 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition hidden">
                Back
            </button>
            <button id="next-btn" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                Next
            </button>
        </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
